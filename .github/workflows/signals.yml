name: Daily Stock Signals

on:
  schedule:
    - cron: '30 3 * * 1-5'    # 9:00 AM IST Mon–Fri (India signals)
    - cron: '30 13 * * 1-5'   # 7:00 PM IST Mon–Fri (US signals)
  workflow_dispatch:            # lets you run it manually anytime

jobs:
  send-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run signal sender
        env:
          ANTHROPIC_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python signal_sender.py
